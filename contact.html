<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Nourish You 365</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="navbar">
        <div class="container nav-container">

            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Nourish You 365 logo">
            </a>

            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="testimonials.html">Testimonials</a></li>
                    <li><a href="blog.html">Resources</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>

            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

        </div>
    </header>

    <section class="page-hero">

        <div class="container">

            <h1>Contact</h1>

            <p>
                Ready to start your wellness journey? Let's connect.
            </p>

        </div>

    </section>

    <section class="section">

        <div class="container contact-grid">

            <div class="contact-info">

                <h2>Get In Touch</h2>

                <p>
                    Reach out with questions or to schedule a consultation.
                </p>

                <div class="contact-details">
                    <p><strong>Email:</strong> hello@nourishyou365.com</p>
                    <p><strong>Instagram:</strong> @nourishyou365</p>
                </div>

            </div>

            <form class="contact-form">

                <input type="text" placeholder="Your Name" required>

                <input type="email" placeholder="Your Email" required>

                <textarea rows="6" placeholder="How can I help you?"></textarea>

                <button type="submit" class="btn primary-btn">
                    Send Message
                </button>

            </form>

        </div>

    </section>

    <footer class="footer">
        <div class="container footer-content">
            <img src="images/logo.png" alt="Nourish You 365 logo">
            <p>© 2026 Nourish You 365</p>
        </div>
    </footer>

    <script src="script.js"></script>

</body>

</html>
